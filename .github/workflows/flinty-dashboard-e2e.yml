# Flinty — Vitest + Playwright (TASK-022)
name: Flinty dashboard CI

on:
  push:
    paths:
      - "02-Implementation/interface/lead-qualifier-dashboard/**"
  pull_request:
    paths:
      - "02-Implementation/interface/lead-qualifier-dashboard/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 02-Implementation/interface/lead-qualifier-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: 02-Implementation/interface/lead-qualifier-dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Vitest
        run: npm run test
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Playwright E2E
        run: npm run test:e2e
        env:
          CI: "true"
